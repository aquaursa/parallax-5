name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-gates:
    name: Python gates (compositional + CROPS + fire tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package and runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install jsonschema pyyaml ecdsa z3-solver cvc5 yices-solver click pytest

      - name: Compositional theorems (expect 2,152 checks pass)
        run: PYTHONPATH=src python -m parallax5_coordinator.theorems

      - name: CROPS test suite (expect 19/19)
        run: PYTHONPATH=src python tests/test_crops.py

      - name: Fire tests (expect 70/70)
        run: PYTHONPATH=. python parallax/formal/fire_tests.py

      - name: ObligationSol fire tests
        run: PYTHONPATH=. python parallax/obligationsol/fire_tests.py
      - name: Mapping registry tests (expect 11/11)
        run: PYTHONPATH=src python -m pytest tests/test_mapping_registry.py -v

      - name: Worked-example certificates validate
        run: |
          PYTHONPATH=src python -m parallax5_coordinator.cli validate examples/certificate_uniswap_v3_core.json
          PYTHONPATH=src python -m parallax5_coordinator.cli validate demos/vault/output/certificate.json || true

  foundry-tests:
    name: Foundry tests (ParallaxRegistry)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build registry contract
        working-directory: registry
        run: forge build --sizes

      - name: Run Foundry test suite (expect 24/24, incl. 2 fuzz @ 256 runs)
        working-directory: registry
        run: forge test -vvv

  paper-compiles:
    name: Paper compiles cleanly
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live (basic recommended)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended \
            texlive-fonts-recommended texlive-latex-extra texlive-science

      - name: Three-pass pdflatex
        working-directory: paper
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error parallax-5.tex
          pdflatex -interaction=nonstopmode -halt-on-error parallax-5.tex
          pdflatex -interaction=nonstopmode -halt-on-error parallax-5.tex

      - name: Report final paper stats
        working-directory: paper
        run: |
          PAGES=$(pdfinfo parallax-5.pdf | awk '/Pages/{print $2}')
          REFS=$(grep -c 'LaTeX Warning: Reference' parallax-5.log || true)
          ERRS=$(grep -c '^!' parallax-5.log || true)
          echo "Pages: $PAGES"
          echo "Unresolved refs: $REFS"
          echo "Errors: $ERRS"
          test "$ERRS" = "0"
          test "$REFS" = "0"
